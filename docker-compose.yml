services:
  stockhelper:
    build:
      context: .
    image: stockhelper:latest
    working_dir: /app
    stdin_open: true
    tty: true
    # Chart/report workflows bind to 127.0.0.1 on dynamic ports; host networking makes them reachable on the host.
    network_mode: host
    entrypoint: ["python", "run"]
    environment:
      PYTHONUNBUFFERED: "1"
      STOCKHELPER_REPORT_SERVER_FOREGROUND: "1"
    volumes:
      # Mount the repository so code/doc fixes from git are used immediately; rebuild only when dependencies change.
      - .:/app
    command: ["--help"]
